<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الله أولاً</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Reem+Kufi:wght@700&display=swap');
        
        :root {
            --gold-gradient: linear-gradient(145deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            --dark-gold: #8b6b23;
            --creamy: #fdfaf1;
            --brown: #4a342e;
            --bg-color: var(--creamy);
            --text-color: var(--brown);
            --card-bg: #ffffff;
            --btn-shadow: 4px 4px 10px #d1cfc7, -4px -4px 10px #ffffff;
        }

        body { 
            font-family: 'Amiri', serif; 
            background-color: var(--bg-color); 
            background-image: url('https://www.transparenttextures.com/patterns/arabesque.png');
            background-attachment: fixed;
            color: var(--text-color); 
            margin: 0; padding: 15px; 
            transition: background 0.3s ease;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        .dark-mode { --bg-color: #2b1d0e; --text-color: #fcf9f2; --card-bg: #3d2b1a; --btn-shadow: 5px 5px 12px #1a1209, -2px -2px 8px #4d3621; }
        .ramadan-mode { --bg-color: #050a18; --text-color: #e0e0e0; --card-bg: #0d1b3e; --dark-gold: #ffd700; --btn-shadow: 5px 5px 15px #02050d; }

        .container { max-width: 500px; margin: auto; will-change: transform; }

        .logo { 
            font-family: 'Reem Kufi', sans-serif; font-size: 3.5em; 
            background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            margin: 10px 0; text-align: center;
        }

        .main-btn-3d {
            background: var(--card-bg); border: 2px solid var(--dark-gold);
            padding: 14px; border-radius: 15px; margin-bottom: 10px;
            color: var(--text-color); font-weight: bold; width: 100%;
            cursor: pointer; display: flex; justify-content: space-between; align-items: center;
            box-shadow: var(--btn-shadow); transition: transform 0.1s; box-sizing: border-box;
        }
        .main-btn-3d:active { transform: scale(0.96); }

        .global-tasbih-circle {
            width: 160px; height: 160px; margin: 20px auto;
            border-radius: 50%; background: var(--card-bg);
            border: 5px double var(--dark-gold); display: flex; flex-direction: column;
            justify-content: center; align-items: center; box-shadow: var(--btn-shadow);
            cursor: pointer; position: relative;
        }

        .section { display: none; opacity: 0; transition: opacity 0.3s ease; }
        .active { display: block; opacity: 1; }

        .card { background: var(--card-bg); padding: 15px; border-radius: 15px; box-shadow: var(--btn-shadow); border-right: 5px solid var(--dark-gold); margin-bottom: 12px; text-align: right; }
        
        .theme-nav { position: fixed; bottom: 20px; left: 20px; display: flex; gap: 8px; z-index: 1000; }
        .theme-btn { width: 35px; height: 35px; border-radius: 50%; border: 2px solid #fff; cursor: pointer; }

        #subGuard {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color); z-index: 99999;
            flex-direction: column; justify-content: center; align-items: center; padding: 20px;
        }
    </style>
</head>
<body>

<div id="subGuard">
    <h1 class="logo" style="font-size: 2.5em;">محبة في الله..</h1>
    <div class="card" style="border-right:none; border-bottom:5px solid var(--dark-gold);">يُرجى الانضمام لقناتنا للاستمرار في التطبيق ❤️</div>
    <a href="https://t.me/fi9ha" target="_blank" class="main-btn-3d" style="text-decoration:none; background:var(--gold-gradient); color:#000; justify-content:center; width:200px;">انضم الآن</a>
    <button class="main-btn-3d" style="width:200px; justify-content:center;" onclick="verifySubscription()">تم الاشتراك ✨</button>
</div>

<div id="khalwaOverlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:10000; flex-direction:column; justify-content:center; align-items:center; color:#fff; text-align:center;">
    <div id="khalwaAyah" style="font-size: 1.5em; padding: 25px;"></div>
    <button class="main-btn-3d" style="width:auto; background:none; color:white;" onclick="closeKhalwa()">إنهاء الخلوة</button>
</div>

<div class="theme-nav">
    <div class="theme-btn" style="background:#fdfaf1;" onclick="toggleMode('light')"></div>
    <div class="theme-btn" style="background:#2b1d0e;" onclick="toggleMode('dark')"></div>
    <div class="theme-btn" style="background:#050a18;" onclick="toggleMode('ramadan')"></div>
</div>

<div class="container">
    <div id="home" class="section active">
        <h1 class="logo">الله أولاً</h1>
        <p style="text-align:center; color:var(--dark-gold); margin-top:-10px;">سيروا إلى الله عرجى ومكاسير</p>

        <div class="global-tasbih-circle" onclick="incrementGlobal()">
            <span style="font-size:0.8em;">السبحة الجماعية</span>
            <div id="globalCount" style="font-size:2.2em; font-family:'Reem Kufi';">0</div>
            <button id="resetBtn" style="display:none; position:absolute; bottom:5px; background:none; border:none;" onclick="resetGlobal(event)">🔄</button>
        </div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <button class="main-btn-3d" onclick="showSection('namesList')">رحلة الأسماء 📖</button>
            <button class="main-btn-3d" onclick="startKhalwa()">الخلوة 🧘‍♂️</button>
            <button class="main-btn-3d" onclick="showSection('munajatPage')">المناجاة 🤲</button>
            <button class="main-btn-3d" onclick="showSection('thoughtsSection')">خواطر ✨</button>
            <button class="main-btn-3d" style="grid-column:span 2;" onclick="showSection('moodPage')">كيف حال قلبك؟ ❤️</button>
            <button class="main-btn-3d" style="grid-column:span 2; background:var(--gold-gradient); color:#000;" onclick="showSection('favoritesPage')">خزانة رسائلي</button>
        </div>

        <div id="adminPanel" style="display:none; margin-top:20px; border:1px dashed var(--dark-gold); padding:10px; border-radius:15px;">
            <select id="adminActionType" style="width:100%; padding:10px; margin-bottom:5px;">
                <option value="names">أسماء الله</option>
                <option value="thoughts">خاطرة</option>
                <option value="moods">حالة قلب</option>
                <option value="khalwa">عبارة خلوة</option>
            </select>
            <input type="text" id="targetName" placeholder="العنوان" style="width:100%; padding:10px; margin-bottom:5px;">
            <textarea id="mainContent" placeholder="المحتوى" style="width:100%; padding:10px;"></textarea>
            <button class="main-btn-3d" style="justify-content:center; background:#4a342e; color:#fff;" onclick="saveToFirebase()">حفظ</button>
        </div>
    </div>

    <div id="namesList" class="section">
        <h2 class="logo" style="font-size:2em;">الأسماء الحسنى</h2>
        <div id="namesGrid"></div>
        <button class="main-btn-3d" style="justify-content:center" onclick="showSection('home')">رجوع</button>
    </div>

    <div id="nameDetailsPage" class="section">
        <h2 id="detTitle" class="logo"></h2>
        <div class="card" id="detContent"></div>
        <div class="global-tasbih-circle" onclick="incrementLocal()">
            <div id="localCount" style="font-size: 2em;">0</div>
        </div>
        <button class="main-btn-3d" style="justify-content:center" onclick="showSection('namesList')">رجوع</button>
    </div>

    <div id="thoughtsSection" class="section"><div id="thoughtsList"></div><button class="main-btn-3d" onclick="showSection('home')">رجوع</button></div>
    <div id="moodPage" class="section"><div id="moodGrid"></div><button class="main-btn-3d" onclick="showSection('home')">رجوع</button></div>
    <div id="favoritesPage" class="section"><div id="favList"></div><button class="main-btn-3d" onclick="showSection('home')">رجوع</button></div>
    <div id="munajatPage" class="section">
        <textarea id="munajatInput" placeholder="تحدث مع خالقك.." style="width:100%; height:150px; border-radius:15px; padding:10px;"></textarea>
        <button class="main-btn-3d" style="background:var(--gold-gradient); justify-content:center" onclick="sendMunajat()">أستودع الله قلبي</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const ADMIN_ID = 8421694319; // معرفك محفوظ
    firebase.initializeApp({ databaseURL: "https://allahfirst-b9c52-default-rtdb.firebaseio.com/" });
    const db = firebase.database();

    tg.expand();

    // التحقق من الاشتراك (محسن)
    async function verifySubscription() {
        const uId = tg.initDataUnsafe.user?.id;
        if (uId === ADMIN_ID) { document.getElementById('subGuard').style.display='none'; return; }
        try {
            const r = await fetch(`https://api.telegram.org/bot8000457608:AAEmrrhrKUf1-qRM-JDR1Ux8db3ia_v3zKw/getChatMember?chat_id=@fi9ha&user_id=${uId}`);
            const d = await r.json();
            if (d.ok && ['member', 'administrator', 'creator'].includes(d.result.status)) {
                document.getElementById('subGuard').style.display='none';
                localStorage.setItem('isSubbed', 'true');
            } else { alert("يجب الاشتراك بالقناة أولاً ❤️"); }
        } catch(e) { alert("عذراً، تأكد من الاتصال"); }
    }

    if (localStorage.getItem('isSubbed') !== 'true' && tg.initDataUnsafe.user?.id !== ADMIN_ID) {
        document.getElementById('subGuard').style.display = 'flex';
    }

    // إدارة التنقل (أسرع)
    function showSection(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        const target = document.getElementById(id);
        target.classList.add('active');
        if(id === 'home') tg.BackButton.hide(); else tg.BackButton.show();
        
        // تحميل البيانات عند الحاجة فقط (On Demand)
        if(id === 'namesList') loadNames();
        if(id === 'thoughtsSection') loadData('thoughts', 'thoughtsList');
        if(id === 'moodPage') loadData('moods', 'moodGrid', true);
        if(id === 'favoritesPage') renderFavorites();
        window.scrollTo(0,0);
    }

    tg.BackButton.onClick(() => showSection('home'));

    // تسبيح جماعي (مباشر)
    function incrementGlobal() { 
        db.ref('global_count').transaction(c => (c || 0) + 1); 
        tg.HapticFeedback.impactOccurred('medium');
    }
    db.ref('global_count').on('value', s => { 
        document.getElementById('globalCount').innerText = (s.val() || 0).toLocaleString(); 
    });

    // تحميل الأسماء (محسن)
    function loadNames() {
        db.ref('names').once('value', s => {
            const grid = document.getElementById('namesGrid');
            grid.innerHTML = "";
            const data = s.val() || {};
            Object.keys(data).forEach(n => {
                const b = document.createElement('div'); b.className = "main-btn-3d";
                b.innerHTML = `<span onclick="openNamePage('${n}')">${n}</span>`;
                if(tg.initDataUnsafe.user?.id === ADMIN_ID) b.innerHTML += `<span onclick="deleteItem('names/${n}')">🗑️</span>`;
                grid.appendChild(b);
            });
        });
    }

    function openNamePage(n) {
        db.ref('names/'+n).once('value', s => {
            document.getElementById('detTitle').innerText = n;
            document.getElementById('detContent').innerText = s.val();
            document.getElementById('localCount').innerText = 0;
            showSection('nameDetailsPage');
        });
    }

    let lCnt = 0;
    function incrementLocal() { lCnt++; document.getElementById('localCount').innerText = lCnt; tg.HapticFeedback.impactOccurred('light'); }

    // وظيفة عامة لتحميل البيانات لتقليل تكرار الكود
    function loadData(path, containerId, isMood = false) {
        db.ref(path).once('value', s => {
            const cont = document.getElementById(containerId);
            cont.innerHTML = "";
            const data = s.val() || {};
            Object.keys(data).forEach(k => {
                const card = document.createElement('div'); card.className = "card";
                card.innerHTML = `<p>${isMood ? '<b>'+k+'</b><br>'+data[k] : data[k]}</p>`;
                cont.appendChild(card);
            });
        });
    }

    function toggleMode(m) {
        document.body.classList.remove('dark-mode', 'ramadan-mode');
        if(m !== 'light') document.body.classList.add(m + '-mode');
    }

    function saveToFirebase() {
        const type = document.getElementById('adminActionType').value;
        const target = document.getElementById('targetName').value;
        const content = document.getElementById('mainContent').value;
        if(!content) return;
        if(type === 'names' || type === 'moods') db.ref(type+'/'+target).set(content);
        else db.ref(type).push(content);
        alert("تم الحفظ ✓");
    }

    function startKhalwa() {
        db.ref('khalwa').once('value', s => {
            const arr = Object.values(s.val() || ["استشعر قرب الله.."]);
            const over = document.getElementById('khalwaOverlay');
            over.style.display = 'flex';
            let i = 0;
            document.getElementById('khalwaAyah').innerText = arr[0];
            window.kInt = setInterval(() => {
                i = (i + 1) % arr.length;
                document.getElementById('khalwaAyah').innerText = arr[i];
            }, 5000);
        });
    }

    function closeKhalwa() { clearInterval(window.kInt); document.getElementById('khalwaOverlay').style.display='none'; }

    function sendMunajat() { 
        if(!document.getElementById('munajatInput').value) return;
        alert("الله يسمعك.. رُفعت للسماء"); 
        document.getElementById('munajatInput').value = ""; 
        showSection('home'); 
    }

    if(tg.initDataUnsafe.user?.id === ADMIN_ID) {
        document.getElementById('adminPanel').style.display = 'block';
        document.getElementById('resetBtn').style.display = 'block';
    }
</script>
</body>
</html>
