<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الله أولاً</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Reem+Kufi:wght@700&display=swap');
        
        :root {
            --gold-gradient: linear-gradient(145deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            --dark-gold: #8b6b23;
            --creamy: #fdfaf1;
            --brown: #4a342e;
            --bg-color: var(--creamy);
            --text-color: var(--brown);
            --card-bg: #ffffff;
            --btn-shadow: 4px 4px 10px #d1cfc7, -4px -4px 10px #ffffff;
            --pattern: url('https://www.transparenttextures.com/patterns/arabesque.png');
        }

        body { 
            font-family: 'Amiri', serif; background-color: var(--bg-color); background-image: var(--pattern);
            background-attachment: fixed; color: var(--text-color); margin: 0; padding: 15px; min-height: 100vh;
        }

        .dark-mode { --bg-color: #2b1d0e; --text-color: #fcf9f2; --card-bg: #3d2b1a; --btn-shadow: 5px 5px 12px #1a1209, -2px -2px 8px #4d3621; }
        .ramadan-mode { --bg-color: #050a18; --text-color: #e0e0e0; --card-bg: #0d1b3e; --dark-gold: #ffd700; --btn-shadow: 5px 5px 15px #02050d; }

        .container { max-width: 500px; margin: auto; }
        .logo { font-family: 'Reem Kufi', sans-serif; font-size: 3.5em; background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; margin: 10px 0; }

        .main-btn-3d {
            background: var(--card-bg); border: 2px solid var(--dark-gold); padding: 15px; border-radius: 15px; margin-bottom: 12px;
            color: var(--text-color); font-weight: bold; width: 100%; cursor: pointer; display: flex; justify-content: space-between; align-items: center;
            box-shadow: var(--btn-shadow); transition: 0.2s; box-sizing: border-box; font-family: 'Amiri';
        }

        .global-tasbih-circle {
            width: 160px; height: 160px; margin: 20px auto; border-radius: 50%; background: var(--card-bg);
            border: 5px double var(--dark-gold); display: flex; flex-direction: column; justify-content: center; align-items: center; box-shadow: var(--btn-shadow); cursor: pointer;
        }

        .section { display: none; }
        .active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: var(--card-bg); padding: 18px; border-radius: 18px; box-shadow: var(--btn-shadow); border-right: 6px solid var(--dark-gold); margin-bottom: 15px; text-align: right; }

        #subGuard {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color); z-index: 99999; flex-direction: column; justify-content: center; align-items: center;
        }
        
        .admin-input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid var(--dark-gold); background: var(--card-bg); color: var(--text-color); font-family: 'Amiri'; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="subGuard">
    <h1 class="logo" style="font-size: 2.2em;">محبة في الله..</h1>
    <div class="card" style="width: 85%; border-right: none; border-bottom: 6px solid var(--dark-gold); text-align:center;">
        للاستمرار، يرجى الانضمام لقناتنا ❤️
    </div>
    <a href="https://t.me/fi9ha" target="_blank" class="main-btn-3d" style="text-decoration: none; background: var(--gold-gradient); color: #000; justify-content: center; width: 200px;">انضم الآن</a>
    <button class="main-btn-3d" style="width: 200px; justify-content: center; margin-top: 10px;" onclick="verifySubscription()">تم الاشتراك ✨</button>
</div>

<div id="khalwaOverlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:10000; flex-direction:column; justify-content:center; align-items:center; color:#fff; text-align:center;">
    <div id="khalwaAyah" style="font-size: 1.6em; padding: 30px;"></div>
    <button class="main-btn-3d" style="width:auto; background:none; color:white;" onclick="closeKhalwa()">إنهاء الخلوة</button>
</div>

<div class="container">
    <div id="home" class="section active">
        <h1 class="logo">الله أولاً</h1>
        
        <div class="global-tasbih-circle" onclick="incrementGlobal()">
            <span style="font-size: 0.8em; color: var(--dark-gold);">السبحة الجماعية</span>
            <div id="globalCount" style="font-size: 2.2em; font-family:'Reem Kufi';">0</div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="main-btn-3d" onclick="showSection('namesList')">رحلة الأسماء 📖</button>
            <button class="main-btn-3d" onclick="startKhalwa()">الخلوة 🧘‍♂️</button>
            <button class="main-btn-3d" onclick="showSection('moodPage')">كيف حال قلبك؟ ❤️</button>
            <button class="main-btn-3d" onclick="showSection('thoughtsSection')">خواطر ✨</button>
            <button class="main-btn-3d" style="grid-column: span 2; background:var(--gold-gradient); color:#000;" onclick="showSection('favoritesPage')">خزانة رسائلي</button>
        </div>

        <div id="adminPanel" style="display:none; margin-top:20px; border:2px dashed var(--dark-gold); padding:15px; border-radius:15px;">
            <h3 style="color:var(--dark-gold);">🛠 لوحة التحكم</h3>
            <select id="adminActionType" class="admin-input">
                <option value="names">إضافة اسم</option>
                <option value="thoughts">إضافة خاطرة</option>
                <option value="moods">إضافة حالة قلب</option>
                <option value="khalwa">إضافة عبارة خلوة</option>
            </select>
            <input type="text" id="targetName" class="admin-input" placeholder="العنوان">
            <textarea id="mainContent" class="admin-input" rows="3" placeholder="المحتوى"></textarea>
            <button class="main-btn-3d" style="background:var(--dark-gold); color:#fff; justify-content:center;" onclick="saveToFirebase()">حفظ</button>
        </div>
    </div>

    <div id="namesList" class="section"><h2 class="logo">الأسماء الحسنى</h2><div id="namesGrid"></div><button class="main-btn-3d" onclick="showSection('home')">رجوع</button></div>
    <div id="thoughtsSection" class="section"><h2 class="logo">خواطر</h2><div id="thoughtsList"></div><button class="main-btn-3d" onclick="showSection('home')">رجوع</button></div>
    <div id="moodPage" class="section"><h2 class="logo">حال قلبك</h2><div id="moodGrid"></div><button class="main-btn-3d" onclick="showSection('home')">رجوع</button></div>
    <div id="favoritesPage" class="section"><h2 class="logo">خزانتي</h2><div id="favList"></div><button class="main-btn-3d" onclick="showSection('home')">رجوع</button></div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const ADMIN_ID = 8421694319; 
    const BOT_TOKEN = "8000457608:AAEmrrhrKUf1-qRM-JDR1Ux8db3ia_v3zKw";
    
    firebase.initializeApp({ databaseURL: "https://allahfirst-b9c52-default-rtdb.firebaseio.com/" });
    const db = firebase.database();
    tg.expand();

    const userId = tg.initDataUnsafe.user?.id;

    // --- نظام الاشتراك ---
    if (userId !== ADMIN_ID && localStorage.getItem('isSubbed') !== 'true') {
        document.getElementById('subGuard').style.display = 'flex';
    }

    async function verifySubscription() {
        if (userId === ADMIN_ID) { document.getElementById('subGuard').style.display = 'none'; return; }
        try {
            const r = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getChatMember?chat_id=@fi9ha&user_id=${userId}`);
            const d = await r.json();
            if (d.ok && ['member','administrator','creator'].includes(d.result.status)) {
                localStorage.setItem('isSubbed', 'true');
                document.getElementById('subGuard').style.display = 'none';
            } else { alert("يرجى الاشتراك في القناة أولاً ❤️"); }
        } catch(e) { alert("خطأ في الاتصال بالبوت"); }
    }

    // --- وظائف التطبيق ---
    function showSection(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'namesList') loadNames();
        if(id === 'thoughtsSection') loadData('thoughts', 'thoughtsList');
        if(id === 'moodPage') loadData('moods', 'moodGrid', true);
    }

    function incrementGlobal() { db.ref('global_count').transaction(c => (c || 0) + 1); tg.HapticFeedback.impactOccurred('medium'); }
    db.ref('global_count').on('value', s => { document.getElementById('globalCount').innerText = (s.val() || 0).toLocaleString(); });

    function loadNames() {
        db.ref('names').once('value', s => {
            const grid = document.getElementById('namesGrid'); grid.innerHTML = "";
            Object.keys(s.val() || {}).forEach(n => {
                grid.innerHTML += `<div class="main-btn-3d"><span>${n}</span>${userId===ADMIN_ID ? `<span onclick="deleteItem('names/${n}')">🗑️</span>`:''}</div>`;
            });
        });
    }

    function loadData(path, contId, isMood=false) {
        db.ref(path).once('value', s => {
            const cont = document.getElementById(contId); cont.innerHTML = "";
            Object.entries(s.val() || {}).forEach(([k, v]) => {
                cont.innerHTML += `<div class="card"><p>${isMood ? '<b>'+k+'</b><br>'+v : v}</p></div>`;
            });
        });
    }

    function saveToFirebase() {
        const type = document.getElementById('adminActionType').value;
        const target = document.getElementById('targetName').value;
        const content = document.getElementById('mainContent').value;
        if(type === 'names' || type === 'moods') db.ref(type+'/'+target).set(content);
        else db.ref(type).push(content);
        alert("تم الحفظ");
    }

    function startKhalwa() {
        db.ref('khalwa').once('value', s => {
            const ph = Object.values(s.val() || ["استشعر قرب الله.."]);
            document.getElementById('khalwaOverlay').style.display='flex';
            document.getElementById('khalwaAyah').innerText = ph[0];
        });
    }
    function closeKhalwa() { document.getElementById('khalwaOverlay').style.display='none'; }

    if(userId === ADMIN_ID) document.getElementById('adminPanel').style.display = 'block';
</script>
</body>
</html>
