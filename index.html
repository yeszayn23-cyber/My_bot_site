<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الله أولاً</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Aref+Ruqaa:wght@400;700&family=Reem+Kufi:wght@700&display=swap');
        
        :root {
            --gold-gradient: linear-gradient(145deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            --dark-gold: #8b6b23;
            --creamy: #fdfaf1;
            --brown: #4a342e;
            --bg-color: var(--creamy);
            --text-color: var(--brown);
            --card-bg: #ffffff;
            --btn-shadow: 4px 4px 10px #d1cfc7, -4px -4px 10px #ffffff;
            --pattern: url('https://www.transparenttextures.com/patterns/arabesque.png');
        }

        body { font-family: 'Amiri', serif; background-color: var(--bg-color); background-image: var(--pattern); color: var(--text-color); margin: 0; padding: 15px; min-height: 100vh; -webkit-tap-highlight-color: transparent; }
        .dark-mode { --bg-color: #2b1d0e; --text-color: #fcf9f2; --card-bg: #3d2b1a; --btn-shadow: 5px 5px 12px #1a1209, -2px -2px 8px #4d3621; }
        .ramadan-mode { --bg-color: #050a18; --text-color: #e0e0e0; --card-bg: #0d1b3e; --dark-gold: #ffd700; background-image: radial-gradient(circle at top, #1a2a4e, #050a18); --btn-shadow: 5px 5px 15px #02050d; }

        .container { max-width: 500px; margin: auto; position: relative; }
        .logo { font-family: 'Reem Kufi', sans-serif; font-size: 3.5em; background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 10px 0; text-align: center; filter: drop-shadow(2px 3px 4px rgba(0,0,0,0.1)); }

        .main-btn-3d { background: var(--card-bg); border: 2px solid var(--dark-gold); padding: 15px; border-radius: 15px; margin-bottom: 12px; color: var(--text-color); font-weight: bold; width: 100%; cursor: pointer; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--btn-shadow); transition: 0.2s; box-sizing: border-box; text-decoration: none; font-size: 1.1em; }
        .main-btn-3d:active { transform: scale(0.98); }

        .section { display: none; }
        .active { display: block; animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: var(--card-bg); padding: 20px; border-radius: 18px; box-shadow: var(--btn-shadow); border-right: 6px solid var(--dark-gold); margin-bottom: 15px; text-align: center; line-height: 1.8; position: relative; }

        /* ستايل واجهة الاشتراك كما في الصورة بالضبط */
        #subGuard {
            display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color); background-image: var(--pattern); z-index: 100000;
            flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px;
        }
        .sub-title { font-family: 'Reem Kufi', sans-serif; font-size: 2.8em; background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 15px; font-weight: bold; }
        .sub-card { background: #fff; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 90%; margin-bottom: 30px; border-bottom: 8px solid var(--dark-gold); color: #4a342e; font-size: 1.1em; }

        .global-tasbih-circle { width: 160px; height: 160px; margin: 20px auto; border-radius: 50%; background: var(--card-bg); border: 5px double var(--dark-gold); display: flex; flex-direction: column; justify-content: center; align-items: center; box-shadow: var(--btn-shadow); cursor: pointer; position: relative; }
        
        #adminPanel { background: rgba(184, 134, 11, 0.1); border: 2px dashed var(--dark-gold); padding: 15px; border-radius: 20px; margin-top: 30px; text-align: right; padding-bottom: 100px; }
        .admin-input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid var(--dark-gold); background: var(--card-bg); color: var(--text-color); font-family: 'Amiri'; box-sizing: border-box; font-size: 16px; }
    </style>
</head>
<body>

<div id="subGuard">
    <div class="sub-title">محبة في الله..</div>
    <div class="sub-card">
        للاستمرار في تطبيق <b>"الله أولاً"</b>، يرجى الانضمام لقناتنا الرسمية لتصلك الخواطر والرسائل الإيمانية.
    </div>
    <a id="chLink" href="https://t.me/fi9ha" target="_blank" class="main-btn-3d" style="background: var(--gold-gradient); color: #000; justify-content: center; width: 85%; border-radius: 20px; box-shadow: 0 4px 15px rgba(184, 134, 11, 0.3);">انضم للقناة الآن</a>
    <button class="main-btn-3d" style="width: 85%; justify-content: center; margin-top: 15px; border-radius: 20px; background: #fff;" onclick="verifySubscription()">لقد اشتركت، دخول ✨</button>
</div>

<div id="khalwaOverlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:10000; flex-direction:column; justify-content:center; align-items:center; color:#fff; text-align:center;">
    <div id="khalwaAyah" style="font-size: 1.6em; padding: 30px;"></div>
    <div id="khalwaAdminTools"></div>
    <button class="main-btn-3d" style="width:auto; background:none; color:white; border-color:white;" onclick="closeKhalwa()">إنهاء الخلوة</button>
</div>

<div class="container">
    <div id="home" class="section active">
        <h1 class="logo">الله أولاً</h1>
        <div onclick="showSection('activityPage')" style="width:100px; height:50px; position:absolute; top:0; left:50%; transform:translateX(-50%); opacity:0; z-index:100;"></div>

        <div class="global-tasbih-circle" onclick="incrementGlobal()">
            <span style="font-size: 0.8em; color: var(--dark-gold);">السبحة الجماعية</span>
            <div id="globalCount" style="font-size: 2.2em; font-family:'Reem Kufi'; color: var(--dark-gold);">0</div>
            <button id="resetBtn" style="display:none; position:absolute; bottom:5px; background:none; border:none;" onclick="resetGlobal(event)">🔄</button>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="main-btn-3d" onclick="showSection('namesList')">رحلة الأسماء 📖</button>
            <button class="main-btn-3d" onclick="startKhalwa()">الخلوة 🧘‍♂️</button>
            <button class="main-btn-3d" onclick="showSection('munajatPage')">المناجاة 🤲</button>
            <button class="main-btn-3d" onclick="showSection('thoughtsSection')">خواطر ✨</button>
            <button class="main-btn-3d" style="grid-column: span 2;" onclick="showSection('moodPage')">كيف حال قلبك؟ ❤️</button>
            <button class="main-btn-3d" style="grid-column: span 2; background:var(--gold-gradient); color:#000; border:none;" onclick="showSection('favoritesPage')">خزانة رسائلي</button>
        </div>

        <div id="adminPanel" style="display:none;">
            <h3 style="color:var(--dark-gold);">🛠 التحكم (للمالكة)</h3>
            <select id="adminActionType" class="admin-input">
                <option value="names">إضافة اسم ومقاله</option>
                <option value="thoughts">إضافة خاطرة</option>
                <option value="moods">إضافة حالة قلب</option>
                <option value="khalwa">إضافة عبارة خلوة</option>
                <option value="channel_config">تعديل القناة (Target=@id / Content=Token)</option>
            </select>
            <input type="text" id="targetName" class="admin-input" placeholder="الاسم / النوع">
            <textarea id="mainContent" class="admin-input" rows="3" placeholder="المحتوى..."></textarea>
            <button class="main-btn-3d" style="background:var(--dark-gold); color:#fff; justify-content:center;" onclick="saveToFirebase()">حفظ البيانات</button>
            <button class="main-btn-3d" style="background:#4a342e; color:#fff; justify-content:center;" onclick="showUserLogs()">📊 سجل الزوار</button>
            <div id="logsDisplay" style="display:none; font-size:0.8em; background:rgba(255,255,255,0.8); color:#000; padding:10px; border-radius:10px;"></div>
        </div>
    </div>

    <div id="namesList" class="section"><h2 class="logo">الأسماء الحسنى</h2><div id="namesGrid"></div><button class="main-btn-3d" style="justify-content:center" onclick="showSection('home')">رجوع</button></div>
    <div id="thoughtsSection" class="section"><h2 class="logo">خواطر</h2><div id="thoughtsList"></div><button class="main-btn-3d" style="justify-content:center" onclick="showSection('home')">رجوع</button></div>
    <div id="moodPage" class="section"><h2 class="logo">حال قلبك</h2><div id="moodGrid"></div><button class="main-btn-3d" style="justify-content:center" onclick="showSection('home')">رجوع</button></div>
    <div id="favoritesPage" class="section"><h2 class="logo">خزانتي السحابية</h2><div id="favList"></div><button class="main-btn-3d" style="justify-content:center" onclick="showSection('home')">رجوع</button></div>
    <div id="activityPage" class="section"><h2 class="logo">مخطط البوت</h2><div class="card">إحصائيات ونشاط التطبيق قريباً..</div><button class="main-btn-3d" style="justify-content:center" onclick="showSection('home')">رجوع</button></div>
    <div id="munajatPage" class="section"><h2 class="logo">مناجاة</h2><textarea id="munajatInput" class="admin-input" style="height:150px" placeholder="تحدث مع خالقك.."></textarea><button class="main-btn-3d" style="background:var(--gold-gradient); color:#000; justify-content:center;" onclick="sendMunajat()">أستودع الله قلبي</button><button class="main-btn-3d" style="justify-content:center" onclick="showSection('home')">رجوع</button></div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const ADMIN_ID = 8421694319;
    const firebaseConfig = { databaseURL: "https://allahfirst-b9c52-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    tg.expand();
    const userId = tg.initDataUnsafe.user?.id;
    const userName = tg.initDataUnsafe.user?.first_name || "مستخدم";

    let CH_ID = "@fi9ha";
    let B_TOKEN = "8000457608:AAEmrrhrKUf1-qRM-JDR1Ux8db3ia_v3zKw";

    db.ref('app_settings/config').on('value', s => {
        if(s.exists()){
            CH_ID = s.val().channel; B_TOKEN = s.val().token;
            document.getElementById('chLink').href = `https://t.me/${CH_ID.replace('@','')}`;
        }
    });

    if(userId) {
        db.ref('user_logs/' + userId).set({
            name: userName,
            last_seen: new Date().toLocaleString('en-GB')
        });
    }

    async function verifySubscription() {
        if (userId === ADMIN_ID) { document.getElementById('subGuard').style.display = 'none'; return; }
        try {
            const r = await fetch(`https://api.telegram.org/bot${B_TOKEN}/getChatMember?chat_id=${CH_ID}&user_id=${userId}`);
            const d = await r.json();
            if (d.ok && ['member','administrator','creator'].includes(d.result.status)) {
                document.getElementById('subGuard').style.display = 'none';
            } else { alert("عذراً، يجب عليك الاشتراك في القناة أولاً ❤️"); }
        } catch(e) { alert("خطأ في التحقق"); }
    }
    window.onload = verifySubscription;

    // الحفظ في السحابة مضمون (للخواطر وحالات القلب)
    function toggleFavorite(txt) {
        if(!userId) return;
        db.ref('user_favorites/' + userId).push(txt);
        alert("تم الحفظ في الخزانة السحابية بنجاح ✓");
    }

    function renderFavorites() {
        const list = document.getElementById('favList');
        db.ref('user_favorites/' + userId).on('value', s => {
            list.innerHTML = "";
            if(!s.exists()) { list.innerHTML = "<p style='text-align:center;'>خزانتك فارغة حالياً</p>"; return; }
            s.forEach(child => {
                list.innerHTML += `<div class="card"><p>${child.val()}</p><button onclick="deleteItem('user_favorites/${userId}/${child.key}')" style="border:none; background:none; color:gray; cursor:pointer;">❌ إزالة</button></div>`;
            });
        });
    }

    function loadThoughts() {
        db.ref('thoughts').on('value', s => {
            const list = document.getElementById('thoughtsList'); list.innerHTML = "";
            s.forEach(child => {
                const text = child.val();
                list.innerHTML += `<div class="card"><p>${text}</p><button onclick="toggleFavorite('${text.replace(/'/g, "\\'")}')" style="border:none; background:none; color:red; cursor:pointer;">❤️ حفظ</button>${userId===ADMIN_ID ? `<span onclick="deleteItem('thoughts/${child.key}')"> 🗑️</span>`:''}</div>`;
            });
        });
    }

    function showSection(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'thoughtsSection') loadThoughts();
        if(id === 'favoritesPage') renderFavorites();
        if(id === 'moodPage') loadMoods();
    }

    function loadMoods() {
        db.ref('moods').on('value', s => {
            const grid = document.getElementById('moodGrid'); grid.innerHTML = "";
            s.forEach(child => {
                grid.innerHTML += `<div class="card"><h3>${child.key}</h3><p>${child.val()}</p><button class="main-btn-3d" style="font-size:0.8em; justify-content:center;" onclick="toggleFavorite('نصيحة: ${child.val().replace(/'/g, "\\'")}')">❤️ حفظ</button></div>`;
            });
        });
    }

    function saveToFirebase() {
        const type = document.getElementById('adminActionType').value;
        const target = document.getElementById('targetName').value;
        const content = document.getElementById('mainContent').value;
        if(type === 'channel_config') db.ref('app_settings/config').set({ channel: target, token: content });
        else db.ref(type + (target ? '/'+target : '')).push(content);
        alert("تم الحفظ ✓");
    }

    function startKhalwa() {
        db.ref('khalwa').once('value', s => {
            const data = s.val() || {};
            const keys = Object.keys(data);
            const vals = Object.values(data);
            if(keys.length === 0) return;
            document.getElementById('khalwaOverlay').style.display='flex';
            let i=0;
            const up = () => {
                document.getElementById('khalwaAyah').innerText = vals[i];
                if(userId === ADMIN_ID) document.getElementById('khalwaAdminTools').innerHTML = `<button onclick="deleteItem('khalwa/${keys[i]}')" style="color:red; background:white; border:none; padding:5px 10px; border-radius:5px;">حذف 🗑️</button>`;
            };
            up();
            window.kTimer = setInterval(() => { i=(i+1)%vals.length; up(); }, 5000);
        });
    }

    function closeKhalwa() { clearInterval(window.kTimer); document.getElementById('khalwaOverlay').style.display='none'; }
    function deleteItem(p) { if(confirm('حذف؟')) db.ref(p).remove(); }
    function incrementGlobal() { db.ref('global_count').transaction(c => (c || 0) + 1); }
    db.ref('global_count').on('value', s => { document.getElementById('globalCount').innerText = (s.val() || 0).toLocaleString(); });
    if(userId === ADMIN_ID) document.getElementById('adminPanel').style.display = 'block';

    function showUserLogs() {
        const d = document.getElementById('logsDisplay');
        d.style.display = (d.style.display === 'block') ? 'none' : 'block';
        db.ref('user_logs').once('value', s => {
            let h = "";
            s.forEach(u => { h += `👤 ${u.val().name} - 🕒 ${u.val().last_seen}<hr>`; });
            d.innerHTML = h;
        });
    }
</script>
</body>
</html>
