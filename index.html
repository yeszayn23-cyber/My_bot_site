<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الله أولاً</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Aref+Ruqaa:wght@400;700&family=Reem+Kufi:wght@700&display=swap');
        
        :root {
            --gold-gradient: linear-gradient(145deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            --dark-gold: #8b6b23;
            --creamy: #fdfaf1;
            --brown: #4a342e;
            --bg-color: var(--creamy);
            --text-color: var(--brown);
            --card-bg: #ffffff;
            --btn-shadow: 4px 4px 10px #d1cfc7, -4px -4px 10px #ffffff;
            --pattern: url('https://www.transparenttextures.com/patterns/arabesque.png');
        }

        body { 
            font-family: 'Amiri', serif; 
            background-color: var(--bg-color); 
            background-image: var(--pattern);
            background-size: auto;
            background-attachment: fixed;
            color: var(--text-color); 
            margin: 0; padding: 15px; 
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        .dark-mode { --bg-color: #2b1d0e; --text-color: #fcf9f2; --card-bg: #3d2b1a; --btn-shadow: 5px 5px 12px #1a1209, -2px -2px 8px #4d3621; }
        .ramadan-mode { --bg-color: #050a18; --text-color: #e0e0e0; --card-bg: #0d1b3e; --dark-gold: #ffd700; background-image: radial-gradient(circle at top, #1a2a4e, #050a18); --btn-shadow: 5px 5px 15px #02050d; }

        .container { max-width: 500px; margin: auto; }
        .logo { font-family: 'Reem Kufi', sans-serif; font-size: 3.5em; background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 10px 0; text-align: center; filter: drop-shadow(2px 3px 4px rgba(0,0,0,0.1)); }

        .main-btn-3d {
            background: var(--card-bg); border: 2px solid var(--dark-gold);
            padding: 15px; border-radius: 15px; margin-bottom: 12px;
            color: var(--text-color); font-weight: bold; width: 100%;
            cursor: pointer; display: flex; justify-content: space-between; align-items: center;
            box-shadow: var(--btn-shadow); transition: 0.2s; box-sizing: border-box;
        }
        .main-btn-3d:active { transform: scale(0.98); }

        .global-tasbih-circle {
            width: 160px; height: 160px; margin: 20px auto;
            border-radius: 50%; background: var(--card-bg);
            border: 5px double var(--dark-gold); display: flex; flex-direction: column;
            justify-content: center; align-items: center; box-shadow: var(--btn-shadow);
            cursor: pointer; position: relative;
        }

        .section { display: none; }
        .active { display: block; animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #adminPanel { 
            background: rgba(184, 134, 11, 0.1); 
            border: 2px dashed var(--dark-gold); 
            padding: 15px; border-radius: 20px; 
            margin-top: 30px; text-align: right;
            padding-bottom: 100px;
        }
        .admin-input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid var(--dark-gold); background: var(--card-bg); color: var(--text-color); font-family: 'Amiri'; box-sizing: border-box; font-size: 16px; }

        .card { background: var(--card-bg); padding: 18px; border-radius: 18px; box-shadow: var(--btn-shadow); border-right: 6px solid var(--dark-gold); margin-bottom: 15px; text-align: right; line-height: 1.7; }
        
        .theme-nav { position: fixed; top: 10px; left: 10px; display: flex; gap: 8px; z-index: 1000; }
        .theme-btn { width: 30px; height: 30px; border-radius: 50%; border: 2px solid #fff; cursor: pointer; }

        #subGuard {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color); background-image: var(--pattern); z-index: 99999;
            flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }
    </style>
</head>
<body>

<div id="subGuard">
    <h1 class="logo" id="guardLogo" style="font-size: 2.2em;">محبة في الله..</h1>
    <div class="card" style="width: 85%; border-right: none; border-bottom: 6px solid var(--dark-gold); text-align:center;">
        <span id="subMessage">للاستمرار في تطبيق "الله أولاً"، يرجى الانضمام لقناتنا الرسمية.</span>
    </div>
    <a id="subLink" href="#" target="_blank" class="main-btn-3d" style="text-decoration: none; background: var(--gold-gradient); color: #000; justify-content: center; width: 200px;">انضم الآن</a>
    <button class="main-btn-3d" style="width: 200px; justify-content: center; margin-top: 10px;" onclick="verifySubscription()">لقد اشتركت، دخول ✨</button>
</div>

<div id="khalwaOverlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:10000; flex-direction:column; justify-content:center; align-items:center; color:#fff; text-align:center;">
    <div id="khalwaAyah" style="font-size: 1.6em; padding: 30px;"></div>
    <button class="main-btn-3d" style="width:auto; background:none; color:white; border-color:white;" onclick="closeKhalwa()">إنهاء الخلوة</button>
</div>

<div class="theme-nav">
    <div class="theme-btn" style="background: #fdfaf1;" onclick="toggleMode('light')"></div>
    <div class="theme-btn" style="background: #2b1d0e;" onclick="toggleMode('dark')"></div>
    <div class="theme-btn" style="background: #050a18;" onclick="toggleMode('ramadan')"></div>
</div>

<div class="container">
    <div id="home" class="section active">
        <h1 class="logo">الله أولاً</h1>
        
        <div class="global-tasbih-circle" onclick="incrementGlobal()">
            <span style="font-size: 0.8em; color: var(--dark-gold);">السبحة الجماعية</span>
            <div id="globalCount" style="font-size: 2.2em; font-family:'Reem Kufi'; color: var(--dark-gold);">0</div>
            <button id="resetBtn" style="display:none; position:absolute; bottom:5px; background:none; border:none;" onclick="resetGlobal(event)">🔄</button>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="main-btn-3d" onclick="showSection('namesList')">رحلة الأسماء 📖</button>
            <button class="main-btn-3d" onclick="startKhalwa()">الخلوة 🧘‍♂️</button>
            <button class="main-btn-3d" onclick="showSection('munajatPage')">المناجاة 🤲</button>
            <button class="main-btn-3d" onclick="showSection('thoughtsSection')">خواطر ✨</button>
            <button class="main-btn-3d" style="grid-column: span 2;" onclick="showSection('moodPage')">كيف حال قلبك؟ ❤️</button>
            <button class="main-btn-3d" style="grid-column: span 2; background:var(--gold-gradient); color:#000; border:none;" onclick="showSection('favoritesPage')">خزانة رسائلي</button>
        </div>

        <div id="adminPanel" style="display:none;">
            <h3 style="color:var(--dark-gold);">🛠 التحكم (للمالكة)</h3>
            
            <div style="background:rgba(255,255,255,0.3); padding:10px; border-radius:10px; margin-bottom:15px; border:1px solid var(--dark-gold);">
                <p style="margin:0; font-weight:bold; color:var(--dark-gold);">📢 إعدادات الاشتراك الإجباري:</p>
                <input type="text" id="conf_subLink" class="admin-input" placeholder="رابط القناة (https://t.me/...)">
                <input type="text" id="conf_subUsername" class="admin-input" placeholder="معرف القناة بالـ @ (مثال: @fi9ha)">
                <textarea id="conf_subMsg" class="admin-input" placeholder="رسالة طلب الاشتراك..."></textarea>
                <button class="main-btn-3d" style="background:#2ecc71; color:#fff; justify-content:center; height:40px;" onclick="saveSubscriptionSettings()">حفظ إعدادات القناة</button>
            </div>

            <select id="adminActionType" class="admin-input">
                <option value="names">إضافة/تعديل اسم ومقاله</option>
                <option value="tasks">إضافة نقطة عمل لاسم</option>
                <option value="thoughts">إضافة خاطرة</option>
                <option value="moods">إضافة حالة قلب</option>
                <option value="khalwa">إضافة عبارة للخلوة</option>
            </select>
            <input type="text" id="targetName" class="admin-input" placeholder="الاسم / النوع">
            <textarea id="mainContent" class="admin-input" rows="3" placeholder="المحتوى..."></textarea>
            <button class="main-btn-3d" style="background:var(--dark-gold); color:#fff; justify-content:center;" onclick="saveToFirebase()">حفظ البيانات</button>
            
            <button class="main-btn-3d" style="background:#4a342e; color:#fff; justify-content:center;" onclick="showUserLogs()">📊 سجل الزوار</button>
        </div>
    </div>

    <div id="namesList" class="section"><h2 class="logo">الأسماء الحسنى</h2><div id="namesGrid"></div><button class="main-btn-3d" style="justify-content:center" onclick="showSection('home')">رجوع</button></div>
    <div id="nameDetailsPage" class="section"><h2 id="detTitle" class="logo"></h2><div class="card" id="detContent"></div><h3 style="color:var(--dark-gold)">📍 العمل بهذا الاسم:</h3><div id="detTasks"></div><div class="global-tasbih-circle" onclick="incrementLocal()"><span style="font-size: 0.7em;">ورد الاسم</span><div id="localCount" style="font-size: 2.2em; color:var(--dark-gold);">0</div></div><div id="detStories"></div><textarea id="userStoryText" class="admin-input" placeholder="شاركنا موقفاً..."></textarea><button class="main-btn-3d" style="background:var(--gold-gradient); color:#000; justify-content:center;" onclick="submitUserStory()">إرسال الموقف</button><button class="main-btn-3d" style="justify-content:center; margin-top:20px;" onclick="showSection('namesList')">رجوع</button></div>
    <div id="thoughtsSection" class="section"><h2 class="logo">خواطر</h2><div id="thoughtsList"></div><button class="main-btn-3d" style="justify-content:center" onclick="showSection('home')">رجوع</button></div>
    <div id="moodPage" class="section"><h2 class="logo">حال قلبك</h2><div id="moodGrid"></div><button class="main-btn-3d" style="justify-content:center" onclick="showSection('home')">رجوع</button></div>
    <div id="favoritesPage" class="section"><h2 class="logo">خزانتي</h2><div id="favList"></div><button class="main-btn-3d" style="justify-content:center" onclick="showSection('home')">رجوع</button></div>
    <div id="munajatPage" class="section"><h2 class="logo">مناجاة</h2><textarea id="munajatInput" class="admin-input" style="height:150px" placeholder="تحدث مع خالقك.."></textarea><button class="main-btn-3d" style="background:var(--gold-gradient); color:#000; justify-content:center;" onclick="sendMunajat()">أستودع الله قلبي</button><button class="main-btn-3d" style="justify-content:center" onclick="showSection('home')">رجوع</button></div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const ADMIN_ID = 8421694319;
    const firebaseConfig = { databaseURL: "https://allahfirst-b9c52-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    tg.expand();
    const userId = tg.initDataUnsafe.user?.id;
    let currentChannelUser = ""; // لحفظ المعرف المستخدم حاليا للتحقق

    // تحميل إعدادات الاشتراك
    db.ref('app_settings/subscription').on('value', s => {
        const data = s.val();
        if (data) {
            document.getElementById('subMessage').innerText = data.msg || 'يرجى الانضمام لقناتنا للاستمرار';
            document.getElementById('subLink').href = data.link || 'https://t.me/fi9ha';
            currentChannelUser = data.username || '@fi9ha';
            
            // تعبئة الخانات في لوحة الأدمن تلقائياً
            if(userId === ADMIN_ID) {
                document.getElementById('conf_subLink').value = data.link || '';
                document.getElementById('conf_subUsername').value = data.username || '';
                document.getElementById('conf_subMsg').value = data.msg || '';
            }
        }
    });

    // التحكم في ظهور شاشة القفل
    if (userId !== ADMIN_ID) {
        document.getElementById('subGuard').style.display = 'flex';
    }

    async function verifySubscription() {
        if (userId === ADMIN_ID) { document.getElementById('subGuard').style.display = 'none'; return; }
        if (!currentChannelUser) return;

        try {
            const res = await fetch(`https://api.telegram.org/bot8000457608:AAEmrrhrKUf1-qRM-JDR1Ux8db3ia_v3zKw/getChatMember?chat_id=${currentChannelUser}&user_id=${userId}`);
            const d = await res.json();
            if (d.ok && ['member','administrator','creator'].includes(d.result.status)) {
                document.getElementById('subGuard').style.display = 'none';
                tg.showScanQrPopup({text: "تم التحقق بنجاح ✨"});
            } else { 
                alert("لم يتم العثور على اشتراكك في القناة بعد 💔"); 
            }
        } catch(e) { alert("خطأ في الاتصال بالخادم"); }
    }

    function saveSubscriptionSettings() {
        const link = document.getElementById('conf_subLink').value;
        const user = document.getElementById('conf_subUsername').value;
        const msg = document.getElementById('conf_subMsg').value;
        db.ref('app_settings/subscription').set({ link: link, username: user, msg: msg })
        .then(() => alert("تم تحديث إعدادات القناة بنجاح ✓"));
    }

    // --- بقية وظائف التطبيق كما هي ---
    function showSection(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'home') tg.BackButton.hide(); else tg.BackButton.show();
        if(id === 'namesList') loadNames();
        if(id === 'thoughtsSection') loadThoughts();
        if(id === 'moodPage') loadMoods();
        if(id === 'favoritesPage') renderFavorites();
        window.scrollTo(0,0);
    }

    tg.BackButton.onClick(() => showSection('home'));

    function incrementGlobal() { 
        db.ref('global_count').transaction(c => (c || 0) + 1); 
        tg.HapticFeedback.impactOccurred('medium');
    }
    db.ref('global_count').on('value', s => { document.getElementById('globalCount').innerText = (s.val() || 0).toLocaleString(); });

    let lCnt = 0;
    function incrementLocal() { lCnt++; document.getElementById('localCount').innerText = lCnt; tg.HapticFeedback.impactOccurred('light'); }

    function loadNames() {
        db.ref('names').on('value', s => {
            const grid = document.getElementById('namesGrid'); grid.innerHTML = "";
            const data = s.val() || {};
            Object.keys(data).forEach(n => {
                grid.innerHTML += `<div class="main-btn-3d"><span style="flex:1" onclick="openNamePage('${n}')">${n}</span>${userId===ADMIN_ID ? `<span onclick="deleteItem('names/${n}')">🗑️</span>`:''}</div>`;
            });
        });
    }

    function openNamePage(n) {
        currentActiveName = n; lCnt = 0; document.getElementById('localCount').innerText = 0;
        db.ref('names/'+n).once('value', s => {
            document.getElementById('detTitle').innerText = n;
            document.getElementById('detContent').innerText = s.val() || "لا يوجد وصف حالياً.";
            loadList('tasks/'+n, 'detTasks');
            loadList('stories/'+n, 'detStories');
            showSection('nameDetailsPage');
        });
    }

    function loadList(path, containerId) {
        db.ref(path).on('value', s => {
            const container = document.getElementById(containerId); container.innerHTML = "";
            const data = s.val() || {};
            Object.keys(data).forEach(k => {
                container.innerHTML += `<div class="card"><p>${data[k]}</p>${userId===ADMIN_ID ? `<span style="cursor:pointer" onclick="deleteItem('${path}/${k}')">🗑️</span>`:''}</div>`;
            });
        });
    }

    function saveToFirebase() {
        const type = document.getElementById('adminActionType').value;
        const target = document.getElementById('targetName').value;
        const content = document.getElementById('mainContent').value;
        if(!content) return;
        if(type==='thoughts' || type==='khalwa') db.ref(type).push(content);
        else if(type==='tasks') db.ref('tasks/'+target).push(content);
        else db.ref(type+'/'+target).set(content);
        alert("تم الحفظ ✓"); document.getElementById('mainContent').value = "";
    }

    function startKhalwa() {
        db.ref('khalwa').once('value', s => {
            const ph = Object.values(s.val() || ["تهيأ للقاء الله.."]);
            document.getElementById('khalwaOverlay').style.display='flex';
            let i=0; document.getElementById('khalwaAyah').innerText=ph[0];
            window.kTimer = setInterval(() => { i=(i+1)%ph.length; document.getElementById('khalwaAyah').innerText=ph[i]; }, 5000);
        });
    }
    function closeKhalwa() { clearInterval(window.kTimer); document.getElementById('khalwaOverlay').style.display='none'; }
    function toggleMode(m) {
        document.body.classList.remove('dark-mode', 'ramadan-mode');
        if(m === 'dark') document.body.classList.add('dark-mode');
        if(m === 'ramadan') document.body.classList.add('ramadan-mode');
    }
    function deleteItem(path) { if(confirm('حذف؟')) db.ref(path).remove(); }
    function sendMunajat() { alert("الله يسمعك.."); document.getElementById('munajatInput').value = ""; showSection('home'); }
    function resetGlobal(e) { e.stopPropagation(); if(confirm('تصفير؟')) db.ref('global_count').set(0); }

    if(userId === ADMIN_ID) {
        document.getElementById('adminPanel').style.display = 'block';
        document.getElementById('resetBtn').style.display = 'block';
    }
</script>
</body>
</html>
